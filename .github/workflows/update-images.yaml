name: Update images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Flux version'
        required: false

permissions:
  contents: read

env:
  ENTERPRISE_REGISTRY: ghcr.io/controlplaneio-fluxcd
  ENTERPRISE_VARIANTS: alpine;distroless;distroless-fips

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READONLY }}
      - name: Latest release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(gh release view --json tagName -q '.tagName')
          
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      - name: Setup Flux
        uses: fluxcd/flux2/action@04acaec6161ac4fb1a82ffafa88901c03271d34f #v2.8.6
        with:
          version: ${{ steps.release.outputs.version }}
      - name: Enterprise images
        shell: bash
        run: |
          for variant in ${ENTERPRISE_VARIANTS//;/$'\n'}
          do
            DISTRIBUTION="enterprise" \
            REGISTRY="${ENTERPRISE_REGISTRY}" \
            VARIANT="${variant}" \
            VERSION="${{ steps.release.outputs.version }}" \
            .github/workflows/update-images.sh
          done
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update images for Flux ${{ steps.release.outputs.version }}
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: update-images-${{ steps.release.outputs.version }}
          title: Update images for Flux ${{ steps.release.outputs.version }}
          body: |
            Update images with digests for Flux ${{ steps.release.outputs.version }}
          labels: |
            area/images
