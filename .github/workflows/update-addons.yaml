name: Update addons

# Refresh chart and image pins under addons/<addon>/. Mirrors
# update-images.yaml's dispatch-only model — operator runs this
# after a CVE round / dependabot bump rebuilds the addon image,
# or when a new addon-version is published.

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'addon name'
        required: true
        type: choice
        default: dex
        options:
          - dex
      version:
        description: 'addon version (e.g. v2.45.1 for dex). Empty = latest tag in the registry.'
        required: false
        type: string
      chart_version:
        description: 'helm chart version (e.g. 0.24.0 for dex). Empty = latest tag in the chart mirror.'
        required: false
        type: string

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/controlplaneio-fluxcd
  CHART_REGISTRY: ghcr.io/controlplaneio-fluxcd/charts

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READONLY }}
      - name: Helm login to GitHub Container Registry
        shell: bash
        env:
          GHCR_READONLY: ${{ secrets.GHCR_READONLY }}
        run: echo "$GHCR_READONLY" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Resolve and write addon pins
        id: pins
        shell: bash
        env:
          ADDON: ${{ inputs.addon }}
          ADDON_VERSION: ${{ inputs.version }}
          CHART_VERSION: ${{ inputs.chart_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/workflows/update-addons.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update addon ${{ inputs.addon }} ${{ steps.pins.outputs.addon_version }} pins
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: update-addon-${{ inputs.addon }}-${{ steps.pins.outputs.addon_version }}
          title: "Update addon ${{ inputs.addon }} ${{ steps.pins.outputs.addon_version }} pins"
          body: |
            Refresh chart and image pins for the **${{ inputs.addon }}** addon at version `${{ steps.pins.outputs.addon_version }}` (chart `${{ steps.pins.outputs.chart_version }}`):

            - `addons/${{ inputs.addon }}/charts/${{ steps.pins.outputs.chart_version }}/enterprise.yaml` — chart OCIRepository patch from the mirror.
            - `addons/${{ inputs.addon }}/images/${{ steps.pins.outputs.addon_version }}/enterprise-<variant>.yaml` — image digest at this addon-version.
          labels: |
            area/addons
