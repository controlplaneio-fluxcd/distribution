name: Update addons

# Refresh chart and image pins under addons/<addon>/. Mirrors
# update-images.yaml's dispatch-only model — operator runs this
# after a CVE round / dependabot bump rebuilds the addon image,
# or when a new addon-version is published.
#
# Addons are discovered dynamically from the addons/ tree (same as
# the Vulnerability scan - Addons workflow). The default addon=all
# refreshes every addon, opening one PR per addon that has drifted;
# addons already at the latest pins produce no PR.

on:
  workflow_dispatch:
    inputs:
      addon:
        description: 'filter: addon name'
        required: true
        type: choice
        default: all
        options:
          - dex
          - mcp
          - all
      version:
        description: 'addon version (e.g. v2.45.1 for dex, v0.1.0 for mcp). Only honored for a single addon; empty = latest tag in the registry.'
        required: false
        type: string
      chart_version:
        description: 'helm chart version (e.g. 0.24.0 for dex). Only honored for a single addon; empty = latest tag in the chart registry.'
        required: false
        type: string

permissions:
  contents: read

env:
  IMAGE_REGISTRY: ghcr.io/controlplaneio-fluxcd
  CHART_REGISTRY: ghcr.io/controlplaneio-fluxcd/charts

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.find.outputs.addons }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: List addons
        id: find
        shell: bash
        env:
          FILTER_ADDON: ${{ inputs.addon }}
        run: |
          set -euo pipefail
          [ "${FILTER_ADDON:-all}" = "all" ] && FILTER_ADDON=""
          addons="[]"
          for dir in addons/*/; do
            addon="$(basename "$dir")"
            [ -n "$FILTER_ADDON" ] && [ "$addon" != "$FILTER_ADDON" ] && continue
            addons="$(jq -c --arg a "$addon" '. + [$a]' <<<"$addons")"
          done
          echo "addons=$addons" >> "$GITHUB_OUTPUT"
          echo "$addons" | jq .

  generate:
    needs: discover
    if: needs.discover.outputs.addons != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJSON(needs.discover.outputs.addons) }}
    name: generate ${{ matrix.addon }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_READONLY }}
      - name: Helm login to GitHub Container Registry
        shell: bash
        env:
          GHCR_READONLY: ${{ secrets.GHCR_READONLY }}
        run: echo "$GHCR_READONLY" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Resolve and write addon pins
        id: pins
        shell: bash
        env:
          ADDON: ${{ matrix.addon }}
          ADDON_VERSION: ${{ inputs.addon != 'all' && inputs.version || '' }}
          CHART_VERSION: ${{ inputs.addon != 'all' && inputs.chart_version || '' }}
        run: .github/workflows/update-addons.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update addon ${{ matrix.addon }} ${{ steps.pins.outputs.addon_version }} pins
          committer: GitHub <noreply@github.com>
          signoff: true
          branch: update-addon-${{ matrix.addon }}-${{ steps.pins.outputs.addon_version }}
          title: "Update addon ${{ matrix.addon }} ${{ steps.pins.outputs.addon_version }} pins"
          body: |
            Refresh chart and image pins for the **${{ matrix.addon }}** addon at version `${{ steps.pins.outputs.addon_version }}` (chart `${{ steps.pins.outputs.chart_version }}`):

            - `addons/${{ matrix.addon }}/charts/${{ steps.pins.outputs.chart_version }}/enterprise.yaml` — chart OCIRepository patch from the mirror.
            - `addons/${{ matrix.addon }}/images/${{ steps.pins.outputs.addon_version }}/enterprise-<variant>.yaml` — image digest at this addon-version.
          labels: |
            area/addons
